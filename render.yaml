services:
  - type: web
    name: understudy-api
    runtime: docker
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: understudy-db, property: connectionString }
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: chrome-extension://ommkljifocbafblgniaibpdkfdcjolem
databases:
  - name: understudy-db
    databaseName: understudy
    user: understudy
