services:
  db:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: understudy, POSTGRES_USER: understudy, POSTGRES_PASSWORD: change-me }
    ports: ["5432:5432"]
    volumes: ["understudy_postgres:/var/lib/postgresql/data"]
  api:
    build: { context: ., dockerfile: backend/Dockerfile }
    environment: { DATABASE_URL: postgres://understudy:change-me@db:5432/understudy, JWT_SECRET: replace-this-before-use, OPENAI_API_KEY: ${OPENAI_API_KEY}, ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173} }
    ports: ["8787:8787"]
    depends_on: [db]
volumes: { understudy_postgres: {} }
